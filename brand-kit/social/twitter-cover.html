<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prosight · Twitter/X Cover · 1500×500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1500px;height:500px;overflow:hidden;background:#0B1629}
.cover{
  width:1500px;height:500px;
  background:linear-gradient(135deg,#0B1629 0%,#0D2240 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 100px;position:relative;overflow:hidden;
  font-family:'Sora',system-ui,sans-serif;
}
.grid-bg{
  position:absolute;inset:0;opacity:0.025;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 34px,white 35px),
    repeating-linear-gradient(90deg,transparent,transparent 34px,white 35px);
}
.glow{
  position:absolute;right:200px;top:50%;transform:translateY(-50%);
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,201,167,0.07) 0%,transparent 70%);
}
.left{position:relative;z-index:1}
.tagline{
  font-family:'DM Mono',monospace;font-size:12px;
  letter-spacing:0.2em;text-transform:uppercase;
  color:#00C9A7;margin-bottom:16px;
}
.headline{
  font-size:72px;font-weight:700;color:white;
  letter-spacing:-0.05em;line-height:0.95;margin-bottom:16px;
}
.sub{font-size:18px;color:rgba(255,255,255,0.35);font-weight:300}
.right{position:relative;z-index:1;flex-shrink:0}
.shield-ring{
  width:180px;height:180px;border-radius:50%;
  background:rgba(0,201,167,0.05);
  border:1px solid rgba(0,201,167,0.15);
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>
<div class="cover">
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="left">
    <div class="tagline">Security, Not Surveillance</div>
    <div class="headline">Prosight.</div>
    <div class="sub">ProSight M530 · Body-worn cameras for Indian law enforcement<br>prosight360.in</div>
  </div>

  <div class="right">
    <div class="shield-ring">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 60" width="80" height="100">
        <path d="M9 4 L39 4 Q45 4 45 10 L45 32 Q45 50 24 58 Q3 50 3 32 L3 10 Q3 4 9 4 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M8 30 Q24 16 40 30 Q24 44 8 30 Z" fill="none" stroke="#00C9A7" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="24" cy="30" r="7" fill="none" stroke="#00C9A7" stroke-width="2"/>
        <circle cx="24" cy="30" r="3" fill="#00C9A7"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
